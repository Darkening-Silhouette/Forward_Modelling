name: schaffhausen_gprmax_actual_rect_tunnel_scaled
description: 'Computationally safe actual gprMax rectangular tunnel analogue. Uses
  a shallow scaled tunnel geometry so actual FDTD can run. This is for waveform/radargram
  behaviour, not full 25 m-depth mine-scale modelling.

  '
topography:
- - -6.0
  - 0.0
- - 6.0
  - 0.0
domain:
  length: 12.0
  depth: 4.5
  dx: 0.02
  dz: 0.02
noise:
  relative_percent: 2.0
layers:
- thickness: 2.0
  resistivity: 1000.0
  conductivity: 0.001
  vp: 600.0
  velocity: 600.0
  epsilon_r: 6.0
  permittivity: 6.0
  susceptibility: 1.0e-06
- thickness: 999.0
  resistivity: 500.0
  conductivity: 0.002
  vp: 1200.0
  velocity: 1200.0
  epsilon_r: 9.0
  permittivity: 9.0
  susceptibility: 1.0e-06
target_specs:
- target_type: Rectangle / block
  position_mode: Custom depth
  horizontal_position: Centre
  size: Custom
  property_preset: Air-filled void
  custom_x: 0.0
  custom_depth: 2.8
  radius: 0.8
  width: 5.0
  height: 1.0
  angle: 0.0
  resistivity: 100000.0
  conductivity: 1.0e-05
  vp: 340.0
  epsilon_r: 1.0
  susceptibility: 0.0
anomalies:
- type: polygon
  points:
  - - -2.5
    - -3.3
  - - 2.5
    - -3.3
  - - 2.5
    - -2.3
  - - -2.5
    - -2.3
  resistivity: 100000.0
  conductivity: 1.0e-05
  vp: 340.0
  velocity: 340.0
  epsilon_r: 1.0
  permittivity: 1.0
  susceptibility: 0.0
survey:
  ert:
    array: dipole-dipole
    scheme: dipole-dipole
    electrodes: 41
    spacing: 0.3
    noise_rel: 2.0
    noise_abs: 1.0e-06
    run_inversion: true
  seismic:
    source_frequency: 100.0
    receiver_spacing: 0.25
    recording_time_ms: 120.0
    freq: 100.0
    dx: 0.02
    dz: 0.02
    duration: 0.12
    topography_mode: horizontal_interfaces
    run_background_difference: true
    show_wavefield_snapshot: true
    snapshot_time_ms: 300.0
    receiver_depth_below_surface: 2.0
    source_depth_below_surface: 2.0
  gpr:
    frequency_mhz: 100.0
    trace_spacing: 0.5
    time_window_ns: 80.0
    component: Ey
    run_actual_gprmax: true
    run_background_difference: true
  em:
    frequencies:
    - 475
    - 1525
    - 5625
    - 16025
    - 63025
    coil_spacing: 1.66
    height: 0.1
    orientation: ZZ
files:
  elevation_csv: ''
  data_file: ''
  output_dir: /home/luqman/forward_modelling/outputs
