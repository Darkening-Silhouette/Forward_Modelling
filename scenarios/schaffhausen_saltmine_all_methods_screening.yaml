name: schaffhausen_saltmine_all_methods_screening
description: 'Mine-scale Schaffhausen salt-mine subsidence screening model. Designed
  to be runnable for ERT, seismic, EM, and GPR synthetic/preview mode. Actual gprMax
  FDTD should be disabled for this template because the model is too deep/large.

  '
topography:
- - -50.0
  - 0.0
- - 50.0
  - 0.0
domain:
  length: 100.0
  depth: 50.0
  dx: 0.5
  dz: 0.5
noise:
  relative_percent: 2.0
layers:
- thickness: 5.0
  resistivity: 150.0
  conductivity: 0.006667
  vp: 700.0
  velocity: 700.0
  epsilon_r: 12.0
  permittivity: 12.0
  susceptibility: 1.0e-06
- thickness: 20.0
  resistivity: 80.0
  conductivity: 0.0125
  vp: 1800.0
  velocity: 1800.0
  epsilon_r: 18.0
  permittivity: 18.0
  susceptibility: 1.0e-06
- thickness: 999.0
  resistivity: 30.0
  conductivity: 0.033333
  vp: 3200.0
  velocity: 3200.0
  epsilon_r: 6.0
  permittivity: 6.0
  susceptibility: 1.0e-06
target_specs:
- target_type: Rectangle / block
  position_mode: Custom depth
  horizontal_position: Custom
  size: Custom
  property_preset: Air-filled void
  custom_x: 0.0
  custom_depth: 24.5
  radius: 1.5
  width: 16.0
  height: 3.0
  angle: 0.0
  resistivity: 100000.0
  conductivity: 1.0e-05
  vp: 340.0
  epsilon_r: 1.0
  susceptibility: 0.0
anomalies:
- type: polygon
  points:
  - - -8.0
    - -26.0
  - - 8.0
    - -26.0
  - - 8.0
    - -23.0
  - - -8.0
    - -23.0
  resistivity: 100000.0
  conductivity: 1.0e-05
  vp: 340.0
  velocity: 340.0
  epsilon_r: 1.0
  permittivity: 1.0
  susceptibility: 0.0
survey:
  ert:
    array: dipole-dipole
    scheme: dipole-dipole
    electrodes: 81
    spacing: 1.25
    noise_rel: 2.0
    noise_abs: 1.0e-06
    run_inversion: true
  seismic:
    source_frequency: 25.0
    receiver_spacing: 2.0
    recording_time_ms: 1000.0
    freq: 25.0
    dx: 1.0
    dz: 1.0
    duration: 1.0
    topography_mode: horizontal_interfaces
    run_background_difference: true
    show_wavefield_snapshot: true
    snapshot_time_ms: 300.0
    receiver_depth_below_surface: 2.0
    source_depth_below_surface: 2.0
  gpr:
    frequency_mhz: 50.0
    trace_spacing: 1.0
    time_window_ns: 600.0
    component: Ey
    run_actual_gprmax: false
    run_background_difference: false
  em:
    frequencies:
    - 475
    - 1525
    - 5625
    - 16025
    - 63025
    coil_spacing: 3.66
    height: 0.0
    orientation: ZZ
files:
  elevation_csv: ''
  data_file: ''
  output_dir: /home/luqman/forward_modelling/outputs
