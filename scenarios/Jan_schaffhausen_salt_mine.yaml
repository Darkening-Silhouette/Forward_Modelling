name: Jan_schaffhausen_salt_mine
description: 'Jan-style Schaffhausen salt-mine ERT configuration adapted for the GUI.
  It reproduces the teammate notebook settings as closely as possible: profile length
  92.7 m, depth 50 m, 41 electrodes, combined Wenner + Schlumberger + Dipole-Dipole
  ERT arrays, layer interfaces at 0.3 m and 26 m, resistivities 100 / 10000 / 250
  ohm m, and one highly resistive elliptical anomaly equivalent to the notebook body
  at x=34 m, z=-30 m. GUI coordinates are centred, so anomaly x = 34 - 92.7/2 = -12.35
  m.

  '
topography:
- - -46.35
  - 0.0
- - 46.35
  - 0.0
domain:
  length: 92.7
  depth: 50.0
  dx: 0.5
  dz: 0.5
noise:
  relative_percent: 1.0
layers:
- thickness: 0.3
  resistivity: 100.0
  conductivity: 0.01
  vp: 700.0
  velocity: 700.0
  epsilon_r: 12.0
  permittivity: 12.0
  susceptibility: 1.0e-06
- thickness: 25.7
  resistivity: 10000.0
  conductivity: 0.0001
  vp: 1800.0
  velocity: 1800.0
  epsilon_r: 6.0
  permittivity: 6.0
  susceptibility: 1.0e-06
- thickness: 999.0
  resistivity: 250.0
  conductivity: 0.004
  vp: 3200.0
  velocity: 3200.0
  epsilon_r: 8.0
  permittivity: 8.0
  susceptibility: 1.0e-06
target_specs:
- target_type: Ellipse / elongated lens
  position_mode: Custom depth
  horizontal_position: Custom
  size: Custom
  property_preset: Custom
  custom_x: -12.35
  custom_depth: 30.0
  radius: 2.0
  width: 4.0
  height: 6.0
  angle: 0.0
  resistivity: 1000000.0
  conductivity: 1.0e-06
  vp: 340.0
  epsilon_r: 1.0
  susceptibility: 0.0
anomalies:
- type: ellipse
  label: Jan high-resistivity ellipse
  center:
  - -12.35
  - -30.0
  radius_x: 2.0
  radius_z: 3.0
  area: 0.1
  resistivity: 1000000.0
  conductivity: 1.0e-06
  vp: 340.0
  velocity: 340.0
  epsilon_r: 1.0
  permittivity: 1.0
  susceptibility: 0.0
survey:
  ert:
    array: combined
    scheme: combined
    combined_arrays:
    - wa
    - slm
    - dd
    electrodes: 41
    electrode_x_start: -37.08
    electrode_x_end: 37.08
    spacing: 1.854
    noise_rel: 1.0
    noise_abs: 1.0e-06
    seed: 1337
    mesh_quality: 34
    mesh_area: 0.5
    electrode_refinement_fraction: 0.1
    run_inversion: true
    lam: 2000.0
    lambda_factor: 0.8
    z_weight: 1.0
    max_iter: 20
    d_phi: 1.0
    stop_at_chi1: true
    robust_data: false
    blocky_model: false
    verbose: false
    verbose_inversion: false
  seismic:
    source_frequency: 25.0
    receiver_spacing: 1.854
    recording_time_ms: 1000.0
    freq: 25.0
    dx: 1.0
    dz: 1.0
    duration: 1.0
    topography_mode: horizontal_interfaces
    run_background_difference: true
    show_wavefield_snapshot: true
    snapshot_time_ms: 300.0
    receiver_depth_below_surface: 2.0
    source_depth_below_surface: 2.0
  gpr:
    frequency_mhz: 25.0
    trace_spacing: 2.0
    time_window_ns: 1600.0
    component: Ey
    run_actual_gprmax: false
    run_background_difference: false
  em:
    frequencies:
    - 475
    - 1525
    - 5625
    - 16025
    - 63025
    coil_spacing: 3.66
    height: 0.0
    orientation: ZZ
files:
  elevation_csv: ''
  data_file: ''
  output_dir: /home/luqman/forward_modelling/outputs
