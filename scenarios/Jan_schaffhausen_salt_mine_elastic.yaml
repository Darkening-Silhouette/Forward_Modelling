name: Jan_schaffhausen_salt_mine_elastic
description: >
  Elastic-seismic version of Jan's Schaffhausen salt-mine scenario.
  Based on Jan's original geometry: profile length 92.7 m, geological depth 50 m,
  layer interfaces at 0.3 m and 26 m, and the air-filled/highly resistive elliptical
  anomaly at x = 34 m in Jan's coordinate system. GUI coordinates are centred, so
  anomaly x = 34 - 92.7/2 = -12.35 m. This version adds Vs and density values for
  elastic Devito modelling and uses a safer lower-frequency setup for fieldwork-style
  seismic feasibility testing.

topography:
  - [-46.35, 0.0]
  - [46.35, 0.0]

domain:
  length: 92.7
  depth: 50.0
  dx: 1.0
  dz: 1.0

noise:
  relative_percent: 1.0

layers:
  - thickness: 0.3
    resistivity: 100.0
    conductivity: 0.01
    vp: 700.0
    velocity: 700.0
    vs: 300.0
    rho: 1700.0
    epsilon_r: 12.0
    permittivity: 12.0
    susceptibility: 1.0e-06

  - thickness: 25.7
    resistivity: 10000.0
    conductivity: 0.0001
    vp: 1800.0
    velocity: 1800.0
    vs: 850.0
    rho: 2100.0
    epsilon_r: 6.0
    permittivity: 6.0
    susceptibility: 1.0e-06

  - thickness: 999.0
    resistivity: 250.0
    conductivity: 0.004
    vp: 3200.0
    velocity: 3200.0
    vs: 1700.0
    rho: 2300.0
    epsilon_r: 8.0
    permittivity: 8.0
    susceptibility: 1.0e-06

target_specs:
  - target_type: Ellipse / elongated lens
    position_mode: Custom depth
    horizontal_position: Custom
    size: Custom
    property_preset: Custom
    custom_x: -12.35
    custom_depth: 30.0
    radius: 2.0
    width: 4.0
    height: 6.0
    angle: 0.0
    resistivity: 1000000.0
    conductivity: 1.0e-06
    vp: 340.0
    vs: 150.0
    rho: 1000.0
    epsilon_r: 1.0
    susceptibility: 0.0

