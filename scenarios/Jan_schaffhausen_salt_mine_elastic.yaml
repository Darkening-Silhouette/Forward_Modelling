survey:
  seismic:
    source_frequency: 15.0
    freq: 15.0
    receiver_spacing: 2.0
    recording_time_ms: 1000.0
    duration: 1.0

    # Geometry
    x_src: 46.35
    z_src: 2.0
    z_rec: 2.0
    x_rec_start: 0.0
    x_rec_end: 92.7

    # Elastic solver options
    space_order: 8
    nbl: 30
    free_surface: true
    topography_mode: horizontal_interfaces
    run_background_difference: true

    # Multi-shot/CMP options
    acquisition_mode: single_shot
    nshots: 1
    shot_spacing: 5.0

    # Elastic numerical/source controls
    max_dt_ms: 0.5
    elastic_source_scale: 1000000.0

    # Air/topography filler for elastic model
    vp_air: 560.0
    vs_air: 150.0
    rho_air: 1000.0

    # Plot/QC toggles inherited by acoustic GUI; harmless for elastic
    show_refraction_overlay: true
    show_apparent_velocity: false
    show_first_arrival_difference: true
    show_refraction_summary: false
    save_wavefield_snapshot: false

  ert:
    array: combined
    scheme: combined
    combined_arrays: [wa, slm, dd]
    electrodes: 41
    electrode_x_start: -37.08
    electrode_x_end: 37.08
    spacing: 1.854
    noise_rel: 1.0
    noise_abs: 1.0e-06
    seed: 1337
    run_inversion: true
    lam: 2000.0
    lambda_factor: 0.8
    z_weight: 1.0
    max_iter: 20

  gpr:
    frequency_mhz: 25.0
    trace_spacing: 2.0
    time_window_ns: 1600.0
    component: Ey
    run_actual_gprmax: false
    run_background_difference: false

  em:
    frequencies: [475, 1525, 5625, 16025, 63025]
    coil_spacing: 3.66
    height: 0.0
    orientation: ZZ

files:
